{% extends 'ar/base.html' %}

{% block title %}حذف المهمة - مدير المهام{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-lg border-0 animate__animated animate__fadeInUp">
            <div class="card-body text-center p-5">
                <div class="mb-4">
                    <i class="fas fa-exclamation-triangle fa-4x text-warning"></i>
                </div>
                <h3 class="fw-bold mb-3">حذف المهمة؟</h3>
                <p class="text-muted mb-4">
                    هل أنت متأكد من حذف المهمة 
                    <strong>"{{ task.title }}"</strong>؟
                    هذا الإجراء لا يمكن التراجع عنه.
                </p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{% url 'todo:task_list' %}" class="btn btn-secondary btn-lg px-4">
                            <i class="fas fa-times ms-2"></i>إلغاء
                        </a>
                        <button type="submit" class="btn btn-danger btn-lg px-4">
                            <i class="fas fa-trash ms-2"></i>حذف
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
